# =============================================================================
# FEATURE-TO-TAG MAPPING RULES
# Used by audio-analyzer to convert analysis output → Suno style tags
# =============================================================================
feature_mapping:
  bpm:
    "< 70":
      tags: ["slow", "ballad", "dirge"]
      note: "Very slow, ballad or dirge territory"
    "70-90":
      tags: ["mid-tempo", "laid-back", "groove"]
      note: "Relaxed groove, hip-hop, chill"
    "90-110":
      tags: ["moderate", "steady", "driving"]
      note: "Standard rock/pop feel"
    "110-130":
      tags: ["upbeat", "energetic", "driving"]
      note: "Dance-ready energy"
    "130-150":
      tags: ["fast", "pumping", "intense"]
      note: "EDM, drum and bass, thrash territory"
    "> 150":
      tags: ["frenetic", "breakneck", "high-octane"]
      note: "Extreme tempo — metal, jungle, gabber"

  key_scale:
    major_keys:
      tags: ["bright", "uplifting", "happy", "triumphant"]
      note: "Major = generally positive valence"
    minor_keys:
      tags: ["dark", "melancholic", "tense", "brooding"]
      note: "Minor = generally negative valence"
    dorian:
      tags: ["soulful", "bluesy", "warm minor"]
      note: "Dorian mode — jazz, soul, funk"
    phrygian:
      tags: ["exotic", "dark", "flamenco-esque"]
      note: "Phrygian — flamenco, metal, middle-eastern"
    lydian:
      tags: ["dreamy", "magical", "floating"]
      note: "Lydian — film scores, fantasy"
    mixolydian:
      tags: ["bluesy", "rock", "earthy"]
      note: "Mixolydian — rock, folk, funk"

  danceability:
    # Essentia danceability scale (higher = more danceable)
    "> 1.5":
      tags: ["groove", "rhythmic", "danceable", "infectious beat"]
      note: "Highly danceable"
    "1.0-1.5":
      tags: ["driving", "steady pulse", "head-nodding"]
      note: "Moderately rhythmic"
    "< 1.0":
      tags: ["atmospheric", "flowing", "free-form"]
      note: "Non-danceable, ambient or complex rhythm"

  lufs:
    # Integrated loudness (LUFS)
    "> -9":
      tags: ["heavily compressed", "loud", "wall of sound", "radio-ready"]
      note: "Over-compressed, modern pop/EDM mastering"
    "-9 to -14":
      tags: ["punchy", "dynamic", "well-produced"]
      note: "Typical commercial mastering"
    "-14 to -18":
      tags: ["dynamic", "spacious", "audiophile"]
      note: "Wider dynamic range"
    "< -18":
      tags: ["quiet", "intimate", "acoustic", "sparse"]
      note: "Very dynamic — classical, acoustic, ambient"

  spectral_centroid:
    # Brightness proxy
    "high (> 3000 Hz avg)":
      tags: ["bright", "crisp", "airy", "treble-heavy"]
    "mid (1500-3000 Hz)":
      tags: ["balanced", "natural", "full-range"]
    "low (< 1500 Hz)":
      tags: ["warm", "dark", "bass-heavy", "lo-fi"]

  energy:
    # RMS / perceived energy
    "high (> 0.3 RMS)":
      tags: ["intense", "powerful", "loud", "aggressive"]
    "mid (0.1-0.3 RMS)":
      tags: ["driving", "energetic", "dynamic"]
    "low (< 0.1 RMS)":
      tags: ["soft", "delicate", "quiet", "intimate"]

# =============================================================================
# FORBIDDEN COMBINATIONS
# Tags that produce contradictory/incoherent Suno results — never use together
# =============================================================================
forbidden_combos:
  - tags: ["808 bass", "acoustic guitar"]
    reason: "Electronic trap element conflicts with organic acoustic texture"
  - tags: ["orchestral", "trap beat"]
    reason: "Contradictory production styles — use 'hybrid orchestral' instead if needed"
  - tags: ["lo-fi", "pristine production"]
    reason: "Directly contradictory fidelity descriptors"
  - tags: ["lo-fi", "radio-ready"]
    reason: "Lo-fi implies imperfection; radio-ready implies polish"
  - tags: ["classical", "808 bass"]
    reason: "Anachronistic instrument combination"
  - tags: ["acoustic", "heavily compressed"]
    reason: "Acoustic implies dynamics; heavy compression kills them"
  - tags: ["sparse", "wall of sound"]
    reason: "Directly opposite production density"
  - tags: ["intimate", "epic"]
    reason: "Contradictory scale/scope"
  - tags: ["a cappella", "drum machine"]
    reason: "A cappella means no instruments including drums"
  - tags: ["free-form", "four-on-the-floor"]
    reason: "Free rhythm vs. rigid dance groove"
  - tags: ["spoken word", "falsetto"]
    reason: "Contradictory vocal delivery modes"
  - tags: ["ambient", "breakneck"]
    reason: "Ambient implies slow-paced; breakneck is extreme speed"

